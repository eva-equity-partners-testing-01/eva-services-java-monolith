repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  # Google Java Format (replaces black)
  - repo: https://github.com/pre-commit/mirrors-google-java-format
    rev: v1.19.2
    hooks:
      - id: google-java-format
        args: ["--aosp"]         

  # Checkstyle (replaces flake8)
  - repo: local
    hooks:
      - id: checkstyle
        name: Checkstyle
        language: system
        entry: mvn checkstyle:check
        pass_filenames: false
        files: \.java$

  # PMD – static analysis
  - repo: local
    hooks:
      - id: pmd
        name: PMD Static Analysis
        language: system
        entry: mvn pmd:check
        pass_filenames: false
        files: \.java$

  # Maven build + test gate
  - repo: local
    hooks:
      - id: maven-test
        name: Maven Test
        language: system
        entry: mvn test -q
        pass_filenames: false
        files: \.java$
