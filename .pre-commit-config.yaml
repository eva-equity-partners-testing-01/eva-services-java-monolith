repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  # All Java checks via Maven (no external downloads)
  - repo: local
    hooks:
      - id: spotless
        name: Spotless (Google Java Format + imports)
        language: system
        entry: ./mvnw spotless:check        # uses project's mvnw wrapper
        pass_filenames: false
        files: \.java$

      - id: checkstyle
        name: Checkstyle
        language: system
        entry: ./mvnw checkstyle:check
        pass_filenames: false
        files: \.java$

      - id: pmd
        name: PMD Static Analysis
        language: system
        entry: ./mvnw pmd:check
        pass_filenames: false
        files: \.java$

      - id: maven-test
        name: Maven Test
        language: system
        entry: ./mvnw test -q
        pass_filenames: false
        files: \.java$
