name: Enforce PR Policy

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-24.04

    steps:
      - name: Validate source branch naming
        run: |
          BRANCH="${{ github.head_ref }}"

          # Allowed formats aligned with Redmine extraction
          VALID_BRANCH="^(feature|bugfix|issue)/[0-9]+-[a-zA-Z0-9._-]+$"

          echo "Checking branch: $BRANCH"

          if [[ "$BRANCH" =~ $VALID_BRANCH ]]; then
            echo "Branch name is valid: $BRANCH"
          else
            echo "Invalid branch name: $BRANCH"
            echo ""
            echo "Allowed formats:"
            echo "  feature/<id>-<name>"
            echo "  bugfix/<id>-<name>"
            echo "  issue/<id>-<name>"
            echo ""
            echo "Examples:"
            echo "  feature/123-login-fix"
            echo "  bugfix/456-api-error"
            echo "  issue/789-ui-alignment"
            exit 1
          fi

      - name: Validate PR title (optional)
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          echo "Checking PR title: $TITLE"

          if echo "$TITLE" | grep -qE '#[0-9]+'; then
            echo "PR title contains issue reference"
          else
            echo "PR title does not contain issue ID (not blocking)"
          fi
