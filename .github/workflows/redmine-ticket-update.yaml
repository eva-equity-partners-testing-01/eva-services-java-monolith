name: Validate Redmine Ticket on PR

on:
  pull_request:
    branches:
      - dev
    types: [opened, reopened, synchronize, closed]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  validate-ticket:
    runs-on: ubuntu-latest

    steps:
      # 🔹 FLAG CHECK
      - name: Check VALIDATE_REDMINE flag
        id: flag
        run: |
          if [ "${{ vars.VALIDATE_REDMINE }}" = "YES" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if disabled
        if: steps.flag.outputs.enabled == 'false'
        run: echo "Skipping Redmine validation"

      # 🔹 EXTRACT ISSUE ID (FIXED)
      - name: Extract issue number from branch
        if: steps.flag.outputs.enabled == 'true'
        id: extract
        run: |
          BRANCH="${{ github.head_ref }}"

          # extract first number found anywhere in branch
          ISSUE_ID=$(echo "$BRANCH" | grep -oE '[0-9]+' | head -1)

          if [ -z "$ISSUE_ID" ]; then
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "issue_id=$ISSUE_ID" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      # 🔹 REDMINE VALIDATION
      - name: Check ticket in Redmine
        if: steps.extract.outputs.found == 'true' && steps.flag.outputs.enabled == 'true'
        id: check
        run: |
          ISSUE_ID="${{ steps.extract.outputs.issue_id }}"
          PROJECT_NAME="${{ vars.REDMINE_PROJECT_NAME }}"
          REDMINE_URL="${{ vars.REDMINE_URL }}"

          RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
            -H "X-Redmine-API-Key: ${{ secrets.REDMINE_API_KEY }}" \
            "$REDMINE_URL/issues/$ISSUE_ID.json")

          if [ "$RESPONSE" = "200" ]; then
            PROJECT=$(python3 -c "import json;print(json.load(open('response.json'))['issue']['project']['name'])")
            STATUS=$(python3 -c "import json;print(json.load(open('response.json'))['issue']['status']['name'])")

            echo "project=$(echo "$PROJECT" | xargs)" >> $GITHUB_OUTPUT
            echo "expected=$(echo "$PROJECT_NAME" | xargs)" >> $GITHUB_OUTPUT
            echo "current_status=$STATUS" >> $GITHUB_OUTPUT
          else
            echo "project=not_found" >> $GITHUB_OUTPUT
            echo "expected=$PROJECT_NAME" >> $GITHUB_OUTPUT
            echo "current_status=unknown" >> $GITHUB_OUTPUT
          fi

      # ❌ FAIL CASE
      - name: Post error comment
        if: steps.flag.outputs.enabled == 'true' && (steps.extract.outputs.found == 'false' || steps.check.outputs.project != steps.check.outputs.expected)
        uses: actions/github-script@v8
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `❌ Invalid Redmine ticket for branch \`${branch}\``
            });

            core.setFailed("Validation failed")

      # ✅ SUCCESS CASE
      - name: Post success comment
        if: steps.flag.outputs.enabled == 'true' && steps.extract.outputs.found == 'true' && steps.check.outputs.project == steps.check.outputs.expected
        uses: actions/github-script@v8
        with:
          script: |
            const issueId = '${{ steps.extract.outputs.issue_id }}';
            const status = '${{ steps.check.outputs.current_status }}';

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `✅ Ticket #${issueId} validated\nStatus: ${status}`
            });

      # 🔹 APPROVERS
      - name: Get PR approvers
        if: steps.flag.outputs.enabled == 'true' && steps.extract.outputs.found == 'true'
        id: reviewers
        uses: actions/github-script@v8
        with:
          script: |
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const approvers = reviews.data
              .filter(r => r.state === 'APPROVED')
              .map(r => r.user.login)
              .join(', ') || 'No approvals yet';

            core.setOutput('approvers', approvers);
